services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    ports:
      - "${SSH_PORT:-2222}:22"
      - "${DEV_PORT:-8888}:8888"
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ..:/workspaces/project:cached
      - ./persist/config:/home/vscode/.config
      - ./persist/local-share:/home/vscode/.local/share
      - ./persist/cache:/home/vscode/.cache
      - ./persist/pi:/home/vscode/.pi
      - ./persist/ssh:/home/vscode/.ssh
    env_file:
      - path: ../.env
        required: false
    command: sleep infinity
